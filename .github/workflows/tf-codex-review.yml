name: Terraform Codex review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "terraform/**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Prepare Terraform config
        working-directory: terraform
        run: |
          cat > backend.hcl <<EOF
          bucket = "${{ vars.TF_STATE_BUCKET }}"
          region = "${{ vars.AWS_REGION || 'us-east-1' }}"
          EOF
          cp terraform.tfvars.example terraform.tfvars

      - name: Terraform init
        working-directory: terraform
        run: terraform init -backend-config=backend.hcl -input=false

      - name: Run Codex
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/tf-plan-review.md
          model: gpt-5.4-mini
          sandbox: danger-full-access
          output-file: codex-output.md

      - name: Post review on PR
        if: github.event_name == 'pull_request' && steps.run_codex.outputs.final-message != ''
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ steps.run_codex.outputs.final-message }}
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: process.env.CODEX_FINAL_MESSAGE,
            });
